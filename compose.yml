services:
  lifenode:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_LLM_BACKEND: "${INSTALL_LLM_BACKEND:-1}"
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "${LIFENODE_PORT:-8000}:8000"
    volumes:
      - lifenode_data:/app/data
      - ./models:/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  lifenode_data:
