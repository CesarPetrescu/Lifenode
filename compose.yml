services:
  lifenode:
    build:
      context: .
      dockerfile: Dockerfile
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - llama-qwen
      - llama-embed
    env_file:
      - .env
    ports:
      - "${LIFENODE_PORT:-8000}:8000"
    volumes:
      - ./user-files:/data/user-files

  llama-qwen:
    build:
      context: .
      dockerfile: Dockerfile.llama-cpp
    restart: unless-stopped
    ulimits:
      memlock: -1
    command:
      - -m
      - ${LLAMACPP_QWEN_MODEL_PATH:-/models/Qwen3.5-0.8B-UD-Q3_K_XL.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - ${LLAMACPP_QWEN_CTX:-4096}
      - -ngl
      - ${LLAMACPP_NGL:-0}
      - --no-mmap
      - --mlock
    volumes:
      - ./models:/models:ro

  llama-embed:
    build:
      context: .
      dockerfile: Dockerfile.llama-cpp
    restart: unless-stopped
    ulimits:
      memlock: -1
    command:
      - -m
      - ${LLAMACPP_EMBED_MODEL_PATH:-/models/embeddinggemma-300M-Q8_0.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --embeddings
      - -c
      - ${LLAMACPP_EMBED_CTX:-2048}
      - -ngl
      - ${LLAMACPP_NGL:-0}
      - --no-mmap
      - --mlock
    volumes:
      - ./models:/models:ro

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    user: "0:0"
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - |
        set -e
        LAST_HASH=""
        SERVER_PID=""
        while true; do
          FILE_LIST="$$(find /data/user-files -type f -name '*.zim' 2>/dev/null | sort || true)"
          if [ -z "$$FILE_LIST" ]; then
            if [ -n "$$SERVER_PID" ]; then
              kill "$$SERVER_PID" 2>/dev/null || true
              wait "$$SERVER_PID" 2>/dev/null || true
              SERVER_PID=""
              LAST_HASH=""
              echo "kiwix: stopped server (no ZIM files found)"
            fi
            echo "kiwix: waiting for .zim files under /data/user-files/*/maps/kiwix"
            sleep 15
            continue
          fi

          FILE_HASH="$$(printf '%s\n' "$$FILE_LIST" | sha256sum | cut -d' ' -f1)"
          NEED_RESTART=0
          if [ "$$FILE_HASH" != "$$LAST_HASH" ]; then
            NEED_RESTART=1
          fi
          if [ -n "$$SERVER_PID" ] && ! kill -0 "$$SERVER_PID" 2>/dev/null; then
            NEED_RESTART=1
          fi

          if [ "$$NEED_RESTART" -eq 1 ]; then
            if [ -n "$$SERVER_PID" ]; then
              kill "$$SERVER_PID" 2>/dev/null || true
              wait "$$SERVER_PID" 2>/dev/null || true
            fi
            FILE_COUNT="$$(printf '%s\n' "$$FILE_LIST" | wc -l | tr -d ' ')"
            echo "kiwix: starting server with $$FILE_COUNT ZIM file(s)"
            sh -c 'find /data/user-files -type f -name "*.zim" -print0 | xargs -0 kiwix-serve --address=all --port=8080' &
            SERVER_PID="$$!"
            LAST_HASH="$$FILE_HASH"
          fi

          sleep 15
        done
    ports:
      - "${LIFENODE_KIWIX_PORT:-8081}:8080"
    volumes:
      - ./user-files:/data/user-files
